<html lang="ko" class="scroll-smooth">
<head>

    <!-- Tailwind 다크모드 수동 제어 설정 -->
    <script>
        tailwind.config = {
            darkMode: 'class', // class 기반 다크모드 활성화
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Noto Sans KR', 'sans-serif'],
                    }
                }
            }
        }

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* 메인 비주얼 부유 애니메이션 */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .animate-float { animation: float 6s ease-in-out infinite; }
        
        /* 스크롤바 숨기기 (선택사항, 깔끔한 UI를 위해) */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
    </style>

    <!-- FOUC(깜빡임) 방지 다크모드 초기화 스크립트 -->
    <script>
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark')
        } else {
            document.documentElement.classList.remove('dark')
        }
    </script>
</head>
<body class="text-slate-800 dark:text-slate-200 antialiased bg-white dark:bg-slate-900 selection:bg-blue-200 selection:text-blue-900 dark:selection:bg-blue-900 dark:selection:text-blue-200 flex flex-col min-h-screen transition-colors duration-300">

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            /* 1. 모바일 햄버거 메뉴 토글 */
            const mobileMenuBtn = document.getElementById('mobile-menu-btn');
            const mobileMenu = document.getElementById('mobile-menu');
            const menuIcon = document.getElementById('menu-icon');
            const closeIcon = document.getElementById('close-icon');

            if(mobileMenuBtn) {
                mobileMenuBtn.addEventListener('click', () => {
                    mobileMenu.classList.toggle('hidden');
                    menuIcon.classList.toggle('hidden');
                    closeIcon.classList.toggle('hidden');
                });
            }

            /* 2. 다크모드 토글 로직 */
            const themeToggleDesktop = document.getElementById('theme-toggle-desktop');
            const themeToggleMobile = document.getElementById('theme-toggle-mobile');
            
            // 아이콘 엘리먼트들
            const darkIconDesktop = document.getElementById('theme-toggle-dark-icon-desktop');
            const lightIconDesktop = document.getElementById('theme-toggle-light-icon-desktop');
            const darkIconMobile = document.getElementById('theme-toggle-dark-icon-mobile');
            const lightIconMobile = document.getElementById('theme-toggle-light-icon-mobile');

            // 초기 로드시 아이콘 상태 설정
            function updateIcons() {
                if (document.documentElement.classList.contains('dark')) {
                    darkIconDesktop.classList.add('hidden');
                    lightIconDesktop.classList.remove('hidden');
                    darkIconMobile.classList.add('hidden');
                    lightIconMobile.classList.remove('hidden');
                } else {
                    lightIconDesktop.classList.add('hidden');
                    darkIconDesktop.classList.remove('hidden');
                    lightIconMobile.classList.add('hidden');
                    darkIconMobile.classList.remove('hidden');
                }
            }
            updateIcons();

            // 테마 변경 함수
            function toggleTheme() {
                document.documentElement.classList.toggle('dark');
                if (document.documentElement.classList.contains('dark')) {
                    localStorage.theme = 'dark';
                } else {
                    localStorage.theme = 'light';
                }
                updateIcons();
            }

            if(themeToggleDesktop) themeToggleDesktop.addEventListener('click', toggleTheme);
            if(themeToggleMobile) themeToggleMobile.addEventListener('click', toggleTheme);

            /* 3. 스크롤 진행률 바 업데이트 */
            const scrollProgress = document.getElementById('scroll-progress');
            window.addEventListener('scroll', () => {
                const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
                const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
                if(height > 0) {
                    const scrolled = (winScroll / height) * 100;
                    scrollProgress.style.width = scrolled + '%';
                }
            });
        });
    </script>
