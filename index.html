<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>홈 | 포트폴리오 | 김민수</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; }
        
        /* 네비게이션 데스크탑 활성화 스타일 */
        .desktop-nav-link {
            border-bottom-width: 2px;
            border-color: transparent;
            transition: all 0.3s ease;
        }
        .desktop-nav-link.active {
            color: #2563eb; /* text-blue-600 */
            font-weight: 600;
            border-color: #2563eb; 
        }
        
        /* 네비게이션 모바일 활성화 스타일 */
        .mobile-nav-link { transition: all 0.3s ease; }
        .mobile-nav-link.active {
            color: #2563eb;
            font-weight: 600;
            background-color: #eff6ff; /* bg-blue-50 */
        }
        
        /* 메인 비주얼 부유 애니메이션 */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .animate-float { animation: float 6s ease-in-out infinite; }
        
        /* 배경 그라데이션 애니메이션 효과 */
        .bg-gradient-animate {
            background: linear-gradient(120deg, #f8fafc 0%, #eff6ff 100%);
        }
    </style>
</head>
<body class="text-slate-800 antialiased bg-white selection:bg-blue-200 selection:text-blue-900 flex flex-col min-h-screen">

    <!-- ========================================================= -->
    <!-- 상단 네비게이션 바 (공통 컴포넌트 시작) -->
    <!-- 복사해서 다른 페이지(예: about.html) 최상단에 붙여넣어 사용할 수 있습니다. -->
    <!-- ========================================================= -->
    <nav class="fixed top-0 left-0 w-full bg-white/90 backdrop-blur-md z-50 border-b border-slate-100 shadow-sm transition-all duration-300">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <!-- 로고 -->
                <a href="index.html" class="text-2xl font-black text-slate-900 smooth-scroll tracking-tighter hover:opacity-80 transition-opacity">
                    KIM<span class="text-blue-600">.</span>
                </a>
                
                <!-- 데스크탑 메뉴 -->
                <div class="hidden md:flex space-x-8 h-full items-center">
                    <!-- 현재 페이지(홈)에 해당하는 태그에 'active' 클래스를 넣어주면 강조됩니다. -->
                    <a href="index.html" class="desktop-nav-link active text-slate-600 hover:text-blue-600 h-full flex items-center px-1 smooth-scroll">홈</a>
                    <a href="about.html" class="desktop-nav-link text-slate-600 hover:text-blue-600 h-full flex items-center px-1 smooth-scroll">소개</a>
                    <a href="strengths.html" class="desktop-nav-link text-slate-600 hover:text-blue-600 h-full flex items-center px-1 smooth-scroll">강점</a>
                    <a href="contact.html" class="desktop-nav-link text-slate-600 hover:text-blue-600 h-full flex items-center px-1 smooth-scroll">연락처</a>
                </div>

                <!-- 모바일 햄버거 버튼 -->
                <div class="md:hidden flex items-center">
                    <button id="mobile-menu-btn" class="text-slate-600 hover:text-blue-600 focus:outline-none p-2 rounded-md" aria-label="메뉴 열기">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <!-- 햄버거 아이콘 -->
                            <path id="menu-icon" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                            <!-- 닫기(X) 아이콘 (초기엔 숨김) -->
                            <path id="close-icon" class="hidden" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- 모바일 드롭다운 메뉴 -->
        <div id="mobile-menu" class="hidden md:hidden bg-white border-b border-slate-100 shadow-lg absolute w-full left-0 origin-top">
            <div class="px-4 pt-2 pb-4 space-y-1">
                <!-- 현재 페이지(홈)에 해당하는 태그에 'active' 클래스를 넣어주면 강조됩니다. -->
                <a href="index.html" class="mobile-nav-link active block px-4 py-3 rounded-lg text-base text-slate-600 hover:text-blue-600 hover:bg-slate-50 smooth-scroll">홈</a>
                <a href="about.html" class="mobile-nav-link block px-4 py-3 rounded-lg text-base text-slate-600 hover:text-blue-600 hover:bg-slate-50 smooth-scroll">소개</a>
                <a href="strengths.html" class="mobile-nav-link block px-4 py-3 rounded-lg text-base text-slate-600 hover:text-blue-600 hover:bg-slate-50 smooth-scroll">강점</a>
                <a href="contact.html" class="mobile-nav-link block px-4 py-3 rounded-lg text-base text-slate-600 hover:text-blue-600 hover:bg-slate-50 smooth-scroll">연락처</a>
            </div>
        </div>
    </nav>
    <!-- ========================================================= -->
    <!-- 상단 네비게이션 바 (공통 컴포넌트 끝) -->
    <!-- ========================================================= -->

    <!-- 메인 콘텐츠 (홈) -->
    <main class="flex-grow flex items-center justify-center pt-16">
        <section class="relative w-full py-20 lg:py-32 bg-gradient-animate overflow-hidden min-h-[calc(100vh-4rem-80px)] flex items-center">
            
            <!-- 장식용 배경 요소 -->
            <div class="absolute inset-0 z-0 pointer-events-none">
                <div class="absolute top-0 right-0 -mr-20 -mt-20 w-[30rem] h-[30rem] rounded-full bg-blue-100 opacity-60 blur-3xl"></div>
                <div class="absolute bottom-0 left-0 -ml-20 -mb-20 w-80 h-80 rounded-full bg-indigo-100 opacity-50 blur-3xl"></div>
            </div>
            
            <div class="relative z-10 max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 w-full flex flex-col md:flex-row items-center justify-between gap-12 lg:gap-20">
                
                <!-- 좌측 텍스트 콘텐츠 -->
                <div class="flex-1 text-center md:text-left order-2 md:order-1 mt-8 md:mt-0">
                    <div class="inline-flex items-center px-4 py-2 rounded-full bg-white border border-blue-100 text-blue-700 text-sm font-bold tracking-wider mb-6 shadow-sm">
                        <span class="w-2 h-2 rounded-full bg-blue-600 mr-2 animate-pulse"></span>
                        Data & AI Developer
                    </div>
                    
                    <h1 class="text-4xl md:text-5xl lg:text-6xl font-black text-slate-900 mb-6 tracking-tight leading-tight">
                        미래 금융을 설계하는<br> 
                        <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-indigo-600">김민수</span>입니다.
                    </h1>
                    
                    <p class="text-lg md:text-xl text-slate-600 mb-10 font-medium leading-relaxed max-w-lg mx-auto md:mx-0">
                        금융권 데이터 분석 및 AI 모델링 직무 취업을 희망하는 <br class="hidden lg:block">
                        <strong class="text-slate-800 border-b-2 border-blue-200 pb-0.5">SSAFY 16기 개발자</strong>입니다. 데이터 속에서 새로운 인사이트를 발견합니다.
                    </p>
                    
                    <div class="flex flex-col sm:flex-row items-center justify-center md:justify-start gap-4">
                        <a href="about.html" class="w-full sm:w-auto inline-flex items-center justify-center bg-blue-600 text-white px-8 py-4 rounded-full font-semibold hover:bg-blue-700 hover:shadow-lg hover:-translate-y-1 transition-all duration-300">
                            저에 대해 알아보기
                            <svg class="w-5 h-5 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                        </a>
                        <a href="contact.html" class="w-full sm:w-auto inline-flex items-center justify-center bg-white text-slate-700 border border-slate-200 px-8 py-4 rounded-full font-semibold hover:bg-slate-50 hover:border-blue-200 hover:text-blue-600 transition-all duration-300">
                            연락하기
                        </a>
                    </div>
                </div>

                <!-- 우측 비주얼 컨테이너 -->
                <div class="flex-1 w-full max-w-md mx-auto order-1 md:order-2">
                    <div class="relative animate-float">
                        <!-- 이미지 뒤쪽 데코레이션 박스 -->
                        <div class="absolute inset-0 bg-gradient-to-tr from-blue-600 to-indigo-400 rounded-[2rem] transform rotate-3 scale-105 opacity-20 shadow-inner"></div>
                        <div class="absolute inset-0 bg-white rounded-[2rem] transform -rotate-2 scale-100 opacity-50"></div>
                        
                        <!-- 메인 이미지 (금융/데이터 분석 컨셉) -->
                        <img 
                            src="https://images.unsplash.com/photo-1611974789855-9c2a0a7236a3?q=80&w=1000&auto=format&fit=crop" 
                            alt="금융 데이터 차트 및 분석 이미지" 
                            class="relative z-10 w-full h-auto rounded-[2rem] shadow-2xl object-cover border-4 border-white/50 backdrop-blur-sm"
                            onerror="this.src='https://placehold.co/800x800/e2e8f0/475569?text=Financial+Data+Analytics'"
                        >
                        
                        <!-- 떠 있는 미니 배지 디자인 -->
                        <div class="absolute -bottom-6 -left-6 bg-white/90 backdrop-blur-md p-4 rounded-2xl shadow-xl z-20 flex items-center gap-4 border border-white">
                            <div class="w-12 h-12 rounded-full bg-blue-50 flex items-center justify-center text-blue-600">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                            </div>
                            <div class="text-left pr-2">
                                <p class="text-xs text-slate-500 font-semibold uppercase tracking-wider mb-0.5">Core Focus</p>
                                <p class="text-sm font-black text-slate-800">Quant & AI Model</p>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </section>
    </main>

    <!-- 공통 푸터 -->
    <footer class="py-8 bg-slate-900 text-center relative z-10 mt-auto">
        <div class="max-w-6xl mx-auto px-4">
            <p class="text-slate-400 text-sm">
                &copy; 2026 김민수. All rights reserved. | Designed for Financial Data/AI Developer Role
            </p>
        </div>
    </footer>

    <script>
        // 모바일 메뉴 토글 스크립트
        document.addEventListener('DOMContentLoaded', () => {
            const mobileMenuBtn = document.getElementById('mobile-menu-btn');
            const mobileMenu = document.getElementById('mobile-menu');
            const menuIcon = document.getElementById('menu-icon');
            const closeIcon = document.getElementById('close-icon');

            if(mobileMenuBtn) {
                mobileMenuBtn.addEventListener('click', () => {
                    mobileMenu.classList.toggle('hidden');
                    menuIcon.classList.toggle('hidden');
                    closeIcon.classList.toggle('hidden');
                });
            }
        });
    </script>
</body>
</html>
