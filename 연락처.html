<!DOCTYPE html>
<html lang="ko" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>포트폴리오 | 김민수</title>
    <!-- Tailwind CSS 로드 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 한글 폰트(Noto Sans KR) 로드 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Noto Sans KR', sans-serif; 
        }
    </style>
</head>
<body class="text-slate-800 antialiased bg-white selection:bg-blue-200 selection:text-blue-900">

    <!-- ========================================================= -->
    <!-- 상단 네비게이션 바 (공통 컴포넌트 시작) -->
    <!-- 복사해서 다른 페이지(예: about.html) 최상단에 붙여넣어 사용할 수 있습니다. -->
    <!-- ========================================================= -->
    <nav class="fixed top-0 left-0 w-full bg-white/90 backdrop-blur-md z-50 border-b border-slate-100 shadow-sm transition-all duration-300">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <!-- 로고 -->
                <a href="#hero" class="text-2xl font-black text-slate-900 smooth-scroll tracking-tighter">
                    KIM<span class="text-blue-600">.</span>
                </a>
                
                <!-- 데스크탑 메뉴 -->
                <div class="hidden md:flex space-x-8 h-full items-center">
                    <!-- 현재 페이지에 해당하는 태그에 'active' 클래스를 넣어주면 강조됩니다. -->
                    <a href="#hero" class="desktop-nav-link active text-slate-600 hover:text-blue-600 h-full flex items-center px-1 smooth-scroll">홈</a>
                    <a href="#about" class="desktop-nav-link text-slate-600 hover:text-blue-600 h-full flex items-center px-1 smooth-scroll">소개</a>
                    <a href="#strengths" class="desktop-nav-link text-slate-600 hover:text-blue-600 h-full flex items-center px-1 smooth-scroll">강점</a>
                    <a href="#contact" class="desktop-nav-link text-slate-600 hover:text-blue-600 h-full flex items-center px-1 smooth-scroll">연락처</a>
                </div>

                <!-- 모바일 햄버거 버튼 -->
                <div class="md:hidden flex items-center">
                    <button id="mobile-menu-btn" class="text-slate-600 hover:text-blue-600 focus:outline-none p-2 rounded-md" aria-label="메뉴 열기">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <!-- 햄버거 아이콘 -->
                            <path id="menu-icon" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                            <!-- 닫기(X) 아이콘 (초기엔 숨김) -->
                            <path id="close-icon" class="hidden" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- 모바일 드롭다운 메뉴 -->
        <div id="mobile-menu" class="hidden md:hidden bg-white border-b border-slate-100 shadow-lg absolute w-full left-0 origin-top">
            <div class="px-4 pt-2 pb-4 space-y-1">
                <!-- 현재 페이지에 해당하는 태그에 'active' 클래스를 넣어주면 강조됩니다. -->
                <a href="#hero" class="mobile-nav-link active block px-4 py-3 rounded-lg text-base text-slate-600 hover:text-blue-600 hover:bg-slate-50 smooth-scroll">홈</a>
                <a href="#about" class="mobile-nav-link block px-4 py-3 rounded-lg text-base text-slate-600 hover:text-blue-600 hover:bg-slate-50 smooth-scroll">소개</a>
                <a href="#strengths" class="mobile-nav-link block px-4 py-3 rounded-lg text-base text-slate-600 hover:text-blue-600 hover:bg-slate-50 smooth-scroll">강점</a>
                <a href="#contact" class="mobile-nav-link block px-4 py-3 rounded-lg text-base text-slate-600 hover:text-blue-600 hover:bg-slate-50 smooth-scroll">연락처</a>
            </div>
        </div>
    </nav>
    <!-- ========================================================= -->
    <!-- 상단 네비게이션 바 (공통 컴포넌트 끝) -->
    <!-- ========================================================= -->

    <!-- CTA 섹션 -->
    <section id="contact" class="py-24 bg-blue-600 relative overflow-hidden">
        <!-- 배경 장식 -->
        <div class="absolute inset-0 opacity-10">
            <svg class="w-full h-full" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <pattern id="grid-pattern" width="40" height="40" patternUnits="userSpaceOnUse">
                        <path d="M0 40V0H40" fill="none" stroke="white" stroke-width="1"/>
                    </pattern>
                </defs>
                <rect width="100%" height="100%" fill="url(#grid-pattern)"/>
            </svg>
        </div>
        
        <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 text-center relative z-10">
            <h2 class="text-3xl md:text-4xl font-bold text-white mb-6">금융 혁신을 이끌어갈 준비된 인재입니다.</h2>
            <p class="text-blue-100 text-lg md:text-xl mb-10 max-w-2xl mx-auto">
                데이터 기반의 의사결정과 AI 기술로 기업에 새로운 가치를 창출하는 개발자가 되겠습니다. 저의 가능성을 확인해보세요.
            </p>
            <a href="mailto:minsu.kim@example.com" class="inline-block bg-white text-blue-700 px-10 py-4 rounded-full font-bold text-lg hover:bg-slate-50 hover:shadow-xl hover:-translate-y-1 transition-all duration-300">
                이력서 요청 및 연락하기
            </a>
        </div>
    </section>

    <!-- 푸터 -->
    <footer class="py-8 bg-slate-900 text-center">
        <div class="max-w-6xl mx-auto px-4">
            <p class="text-slate-400 text-sm">
                &copy; 2026 김민수 (Min-su Kim). All rights reserved. <br class="md:hidden">
                <span class="hidden md:inline">|</span> Designed for Financial Data/AI Developer Role
            </p>
        </div>
    </footer>

    <!-- 스크립트: 인터랙션 구현 -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 1. 스무스 스크롤 로직 (기존 유지)
            const scrollLinks = document.querySelectorAll('.smooth-scroll');
            scrollLinks.forEach(link => {
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    const targetId = this.getAttribute('href');
                    const targetSection = document.querySelector(targetId);
                    
                    if (targetSection) {
                        targetSection.scrollIntoView({
                            behavior: 'smooth',
                            block: 'start'
                        });
                    }
                });
            });

            // 2. 모바일 메뉴 토글 로직
            const mobileMenuBtn = document.getElementById('mobile-menu-btn');
            const mobileMenu = document.getElementById('mobile-menu');
            const menuIcon = document.getElementById('menu-icon');
            const closeIcon = document.getElementById('close-icon');
            const mobileNavLinks = document.querySelectorAll('.mobile-nav-link');

            function toggleMenu() {
                mobileMenu.classList.toggle('hidden');
                menuIcon.classList.toggle('hidden');
                closeIcon.classList.toggle('hidden');
            }

            mobileMenuBtn.addEventListener('click', toggleMenu);

            // 모바일 메뉴의 링크 클릭 시 메뉴 닫기
            mobileNavLinks.forEach(link => {
                link.addEventListener('click', () => {
                    if (!mobileMenu.classList.contains('hidden')) {
                        toggleMenu();
                    }
                });
            });

            // 3. 스크롤 위치에 따른 현재 페이지 활성화(ScrollSpy) 로직 - active 클래스 활용
            const sections = document.querySelectorAll('header[id], section[id]');
            const desktopNavLinks = document.querySelectorAll('.desktop-nav-link');
            const mNavLinks = document.querySelectorAll('.mobile-nav-link');

            function setActiveNav(targetId) {
                // 데스크탑 메뉴 UI 업데이트
                desktopNavLinks.forEach(link => {
                    link.classList.remove('active');
                    if (link.getAttribute('href') === `#${targetId}`) {
                        link.classList.add('active');
                    }
                });

                // 모바일 메뉴 UI 업데이트
                mNavLinks.forEach(link => {
                    link.classList.remove('active');
                    if (link.getAttribute('href') === `#${targetId}`) {
                        link.classList.add('active');
                    }
                });
            }

            window.addEventListener('scroll', () => {
                let current = '';
                const scrollY = window.scrollY;
                
                // 현재 보이는 섹션 감지
                sections.forEach(section => {
                    const sectionTop = section.offsetTop;
                    // 네비바 높이와 여백을 감안하여 활성화 타이밍 조정
                    if (scrollY >= (sectionTop - 150)) {
                        current = section.getAttribute('id');
                    }
                });

                if (current) {
                    setActiveNav(current);
                }
            });
        });
    </script>
</body>
</html>
