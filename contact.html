<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>연락처 | 포트폴리오 | 김민수</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; }
        
        /* 네비게이션 데스크탑 활성화 스타일 */
        .desktop-nav-link {
            border-bottom-width: 2px;
            border-color: transparent;
            transition: all 0.3s ease;
        }
        .desktop-nav-link.active {
            color: #2563eb; /* text-blue-600 */
            font-weight: 600;
            border-color: #2563eb;
        }
        
        /* 네비게이션 모바일 활성화 스타일 */
        .mobile-nav-link { transition: all 0.3s ease; }
        .mobile-nav-link.active {
            color: #2563eb;
            font-weight: 600;
            background-color: #eff6ff; /* bg-blue-50 */
        }
    </style>
</head>
<body class="text-slate-800 antialiased bg-slate-50 selection:bg-blue-200 selection:text-blue-900 flex flex-col min-h-screen">

    <!-- ========================================================= -->
    <!-- 상단 네비게이션 바 (공통 컴포넌트 시작) -->
    <!-- ========================================================= -->
    <nav class="fixed top-0 left-0 w-full bg-white/90 backdrop-blur-md z-50 border-b border-slate-100 shadow-sm transition-all duration-300">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <!-- 로고 -->
                <a href="index.html" class="text-2xl font-black text-slate-900 tracking-tighter hover:opacity-80 transition-opacity">
                    KIM<span class="text-blue-600">.</span>
                </a>
                
                <!-- 데스크탑 메뉴 -->
                <div class="hidden md:flex space-x-8 h-full items-center">
                    <a href="index.html" class="desktop-nav-link text-slate-600 hover:text-blue-600 h-full flex items-center px-1">홈</a>
                    <a href="about.html" class="desktop-nav-link text-slate-600 hover:text-blue-600 h-full flex items-center px-1">소개</a>
                    <a href="strengths.html" class="desktop-nav-link text-slate-600 hover:text-blue-600 h-full flex items-center px-1">강점</a>
                    <!-- 현재 페이지(연락처)에 'active' 클래스 적용 -->
                    <a href="contact.html" class="desktop-nav-link active text-slate-600 hover:text-blue-600 h-full flex items-center px-1">연락처</a>
                </div>

                <!-- 모바일 햄버거 버튼 -->
                <div class="md:hidden flex items-center">
                    <button id="mobile-menu-btn" class="text-slate-600 hover:text-blue-600 focus:outline-none p-2 rounded-md" aria-label="메뉴 열기">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <!-- 햄버거 아이콘 -->
                            <path id="menu-icon" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                            <!-- 닫기(X) 아이콘 (초기엔 숨김) -->
                            <path id="close-icon" class="hidden" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- 모바일 드롭다운 메뉴 -->
        <div id="mobile-menu" class="hidden md:hidden bg-white border-b border-slate-100 shadow-lg absolute w-full left-0 origin-top">
            <div class="px-4 pt-2 pb-4 space-y-1">
                <a href="index.html" class="mobile-nav-link block px-4 py-3 rounded-lg text-base text-slate-600 hover:text-blue-600 hover:bg-slate-50">홈</a>
                <a href="about.html" class="mobile-nav-link block px-4 py-3 rounded-lg text-base text-slate-600 hover:text-blue-600 hover:bg-slate-50">소개</a>
                <a href="strengths.html" class="mobile-nav-link block px-4 py-3 rounded-lg text-base text-slate-600 hover:text-blue-600 hover:bg-slate-50">강점</a>
                <!-- 현재 페이지(연락처)에 'active' 클래스 적용 -->
                <a href="contact.html" class="mobile-nav-link active block px-4 py-3 rounded-lg text-base text-slate-600 hover:text-blue-600 hover:bg-slate-50">연락처</a>
            </div>
        </div>
    </nav>
    <!-- ========================================================= -->
    <!-- 상단 네비게이션 바 (공통 컴포넌트 끝) -->
    <!-- ========================================================= -->

    <main class="flex-grow pt-24 pb-20 px-4 sm:px-6 lg:px-8 flex items-center">
        <div class="max-w-4xl mx-auto w-full">
            
            <!-- 페이지 헤더 -->
            <div class="text-center mb-16">
                <h1 class="text-3xl md:text-4xl font-bold text-slate-900 mb-4 tracking-tight">Contact Me</h1>
                <div class="w-16 h-1 bg-blue-600 mx-auto rounded-full mb-6"></div>
                <p class="text-lg md:text-xl text-slate-600 font-medium max-w-2xl mx-auto">
                    데이터로 새로운 금융의 가치를 창출할 기회를 기다립니다.<br class="hidden md:block">
                    언제든지 편하게 연락해 주세요.
                </p>
            </div>

            <!-- 연락처 카드 컨테이너 -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-3xl mx-auto">
                
                <!-- 전화번호 카드 -->
                <a href="tel:010-0000-0000" class="group bg-white rounded-3xl p-8 shadow-sm border border-slate-100 hover:shadow-xl hover:border-blue-100 hover:-translate-y-1 transition-all duration-300 flex flex-col items-center text-center text-decoration-none">
                    <div class="w-20 h-20 bg-blue-50 rounded-2xl flex items-center justify-center text-blue-600 mb-6 group-hover:bg-blue-600 group-hover:text-white transition-colors duration-300 shadow-sm">
                        <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path>
                        </svg>
                    </div>
                    <h3 class="text-xl font-bold text-slate-900 mb-2">Phone</h3>
                    <p class="text-2xl font-medium text-blue-600 tracking-wide">010-2507-6513</p>
                    <div class="mt-6 flex items-center text-sm font-semibold text-slate-500 group-hover:text-blue-600 transition-colors">
                        <span>전화 걸기</span>
                        <svg class="w-4 h-4 ml-1 opacity-0 group-hover:opacity-100 group-hover:translate-x-1 transition-all" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                    </div>
                </a>

                <!-- 이메일 카드 -->
                <a href="mailto:iopled@naver.com" class="group bg-white rounded-3xl p-8 shadow-sm border border-slate-100 hover:shadow-xl hover:border-blue-100 hover:-translate-y-1 transition-all duration-300 flex flex-col items-center text-center text-decoration-none">
                    <div class="w-20 h-20 bg-blue-50 rounded-2xl flex items-center justify-center text-blue-600 mb-6 group-hover:bg-blue-600 group-hover:text-white transition-colors duration-300 shadow-sm">
                        <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                        </svg>
                    </div>
                    <h3 class="text-xl font-bold text-slate-900 mb-2">Email</h3>
                    <p class="text-xl font-medium text-blue-600">iopled@naver.com</p>
                    <div class="mt-6 flex items-center text-sm font-semibold text-slate-500 group-hover:text-blue-600 transition-colors">
                        <span>메일 보내기</span>
                        <svg class="w-4 h-4 ml-1 opacity-0 group-hover:opacity-100 group-hover:translate-x-1 transition-all" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                    </div>
                </a>

            </div>

        </div>
    </main>

    <footer class="py-8 bg-slate-900 text-center mt-auto">
        <div class="max-w-6xl mx-auto px-4">
            <p class="text-slate-400 text-sm">
                &copy; 2026 김민수. All rights reserved. | Designed for Financial Data/AI Developer Role
            </p>
        </div>
    </footer>

    <script>
        // 모바일 메뉴 토글 스크립트
        document.addEventListener('DOMContentLoaded', () => {
            const mobileMenuBtn = document.getElementById('mobile-menu-btn');
            const mobileMenu = document.getElementById('mobile-menu');
            const menuIcon = document.getElementById('menu-icon');
            const closeIcon = document.getElementById('close-icon');

            if(mobileMenuBtn) {
                mobileMenuBtn.addEventListener('click', () => {
                    mobileMenu.classList.toggle('hidden');
                    menuIcon.classList.toggle('hidden');
                    closeIcon.classList.toggle('hidden');
                });
            }
        });
    </script>
</body>
</html>
